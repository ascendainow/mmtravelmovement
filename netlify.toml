# Netlify Configuration for MM Travel Movement
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

  # Redirect www to non-www
  [[redirects]]
    from = "https://www.mmtravelmovement.com/*"
      to = "https://mmtravelmovement.com/:splat"
        status = 301
          force = true

          # Custom 404 page
          [[redirects]]
            from = "/*"
              to = "/index.html"
                status = 404

                # Security headers
                [[headers]]
                  for = "/*"
                    [headers.values]
                        X-Frame-Options = "DENY"
                            X-XSS-Protection = "1; mode=block"
                                X-Content-Type-Options = "nosniff"
                                    Referrer-Policy = "strict-origin-when-cross-origin"
                                        Permissions-Policy = "camera=(), microphone=(), geolocation=()"

                                        # Cache static assets
                                        [[headers]]
                                          for = "/css/*"
                                            [headers.values]
                                                Cache-Control = "public, max-age=31536000, immutable"

                                                [[headers]]
                                                  for = "/js/*"
                                                    [headers.values]
                                                        Cache-Control = "public, max-age=31536000, immutable"

                                                        [[headers]]
                                                          for = "/images/*"
                                                            [headers.values]
                                                                Cache-Control = "public, max-age=31536000, immutable"
